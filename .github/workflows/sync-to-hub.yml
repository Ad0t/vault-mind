name: Sync to Hugging Face Hub

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Deploy to Hugging Face Spaces (source files only)
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # Clone the existing HF Space so we preserve its git history
          git clone https://4d0T:$HF_TOKEN@huggingface.co/spaces/4d0T/vault-mind /tmp/hf-space

          # Sync source code only — exclude binary/runtime directories
          rsync -av \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='docs' \
            --exclude='data' \
            --exclude='vector_store' \
            --exclude='__pycache__' \
            --exclude='*.pdf' \
            --exclude='*.npy' \
            --exclude='*.db' \
            --exclude='.venv' \
            --exclude='*.pyc' \
            ./ /tmp/hf-space/

          # Use the lean Spaces-specific requirements (not the full pip freeze)
          cp requirements-spaces.txt /tmp/hf-space/requirements.txt

          cd /tmp/hf-space
          git config user.email "github-actions@github.com"
          git config user.name "GitHub Actions"
          git add -A

          # Only commit if there are actual changes
          git diff --staged --quiet || git commit -m "Sync from GitHub ${{ github.sha }}"
          git push
